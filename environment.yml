name: adapt_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - xarray
  - pandas
  - scipy
  - arm_pyart
  - opencv
  - scikit-image
  - matplotlib
  - cartopy>=0.21
  - netCDF4
  - tqdm
  - h5py
  - proj
  - hdf5
  - libnetcdf
  - pillow
  - pyyaml
  - pip
  - pytest>=7.0
  - pytest-cov
  - sphinx>=7.0
  - networkx
  - pip:
      - pydantic>=2.0
      - nexradaws
      - contextily
      - pyproj
      - pyarrow
      - sphinx-autodoc-typehints
      - myst-parser>=2.0
      - pydata-sphinx-theme>=0.15
      - -e .[dev]
